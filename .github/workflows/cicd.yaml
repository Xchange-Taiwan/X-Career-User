# main 分支推送時部署至 AWS Lambda（Serverless Framework）
# 部署後的 Lambda 環境變數對齊 dev-env-deploy.sh
name: X-Career-User Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Node dependencies (Serverless)
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: npx sls deploy --stage prod --region ${{ secrets.AWS_REGION }}
        env:
          STAGE: prod
          THE_REGION: ${{ secrets.AWS_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          SQS_QUEUE_ARN: ${{ secrets.SQS_QUEUE_ARN }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}

      # Block until Lambda's CloudFormation rollout has fully settled.
      # Without this, `update-function-configuration` below can race the
      # in-progress deploy and get its env vars (DB_*, SEARCH_SERVICE_URL,
      # etc.) overwritten when the rollout finishes with serverless.yml's
      # smaller environment block.
      - name: Wait for Lambda update to settle
        run: aws lambda wait function-updated --function-name x-career-user-prod-app

      - name: Update Lambda environment variables
        env:
          XC_USER_BUCKET: ${{ secrets.XC_USER_BUCKET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
          SEARCH_SERVICE_URL: ${{ secrets.SEARCH_SERVICE_URL }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
        run: |
          jq -n \
            --arg XC_USER_BUCKET "$XC_USER_BUCKET" \
            --arg DB_HOST "$DB_HOST" \
            --arg DB_PORT "$DB_PORT" \
            --arg DB_USER "$DB_USER" \
            --arg DB_PASSWORD "$DB_PASSWORD" \
            --arg DB_NAME "$DB_NAME" \
            --arg DB_SCHEMA "$DB_SCHEMA" \
            --arg SEARCH_SERVICE_URL "$SEARCH_SERVICE_URL" \
            --arg AUTH_SERVICE_URL "$AUTH_SERVICE_URL" \
            --arg SQS_QUEUE_URL "$SQS_QUEUE_URL" \
            '{
              FunctionName: "x-career-user-prod-app",
              Environment: {
                Variables: {
                  STAGE: "prod",
                  TESTING: "false",
                  XC_USER_BUCKET: $XC_USER_BUCKET,
                  BATCH: "20",
                  MAX_PERIOD_SECS: "2678400",
                  DATETIME_FORMAT: "%Y-%m-%dT%H:%M:%Z",
                  DEFAULT_LANGUAGE: "zh_TW",
                  PROBE_CYCLE_SECS: "3",
                  CACHE_TTL: "300",
                  DB_HOST: $DB_HOST,
                  DB_PORT: $DB_PORT,
                  DB_USER: $DB_USER,
                  DB_PASSWORD: $DB_PASSWORD,
                  DB_NAME: $DB_NAME,
                  DB_SCHEMA: $DB_SCHEMA,
                  DB_SSL: "require",
                  RESERVATION_ISOLAION_LEVEL: "SERIALIZABLE",
                  DB_POOL_SIZE: "20",
                  DB_MAX_OVERFLOW: "4",
                  DB_POOL_TIMEOUT: "30",
                  DB_POOL_RECYCLE: "3600",
                  DB_POOL_PRE_PING: "1",
                  DB_COMMAND_TIMEOUT: "60",
                  DB_JIT_OFF: "1",
                  SEARCH_SERVICE_URL: $SEARCH_SERVICE_URL,
                  AUTH_SERVICE_URL: $AUTH_SERVICE_URL,
                  MQ_CONNECT_TIMEOUT: "10",
                  MQ_READ_TIMEOUT: "10",
                  MQ_MAX_ATTEMPTS: "3",
                  SQS_QUEUE_URL: $SQS_QUEUE_URL
                }
              }
            }' > /tmp/user-lambda-update.json
          aws lambda update-function-configuration --cli-input-json file:///tmp/user-lambda-update.json

      - name: Verify SQS configuration
        env:
          SQS_QUEUE_ARN: ${{ secrets.SQS_QUEUE_ARN }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
        run: |
          aws lambda wait function-updated --function-name x-career-user-prod-app
          ACTUAL_QUEUE_URL="$(aws lambda get-function-configuration \
            --function-name x-career-user-prod-app \
            --query 'Environment.Variables.SQS_QUEUE_URL' \
            --output text)"
          test "$ACTUAL_QUEUE_URL" = "$SQS_QUEUE_URL"
          aws sqs get-queue-attributes \
            --queue-url "$SQS_QUEUE_URL" \
            --attribute-names QueueArn \
            --query "Attributes.QueueArn == '$SQS_QUEUE_ARN'" \
            --output text | grep -q True
          echo "Verified prod User Lambda SQS configuration."
